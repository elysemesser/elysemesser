<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" width="1200" height="140" role="img" aria-label="">
  <defs>
    <linearGradient id="sea" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#36d1dc"/>
      <stop offset="55%" stop-color="#3a7bd5"/>
      <stop offset="100%" stop-color="#1e3c72"/>
    </linearGradient>
  </defs>

  <style>
    .wave1 { animation: drift1 14s linear infinite; }
    .wave2 { animation: drift2 9s linear infinite; }
    @keyframes drift1 { from { transform: translateX(0); } to { transform: translateX(-400px); } }
    @keyframes drift2 { from { transform: translateX(-500px); } to { transform: translateX(0); } }
  </style>

  <rect width="1200" height="140" fill="url(#sea)"/>

  <g class="wave1" opacity="0.35">
    <path fill="#ffffff" d="M0 28 Q 100 6 200 28 T 400 28 T 600 28 T 800 28 T 1000 28 T 1200 28 T 1400 28 T 1600 28 V 0 H 0 Z"/>
  </g>
  <g class="wave2" opacity="0.5">
    <path fill="#ffffff" d="M0 16 Q 125 -4 250 16 T 500 16 T 750 16 T 1000 16 T 1250 16 T 1500 16 T 1750 16 V 0 H 0 Z"/>
  </g>
</svg>
