<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Elyse Messer — Senior Engineer at Elcano">
  <defs>
    <linearGradient id="sea" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3c72"/>
      <stop offset="45%" stop-color="#3a7bd5"/>
      <stop offset="100%" stop-color="#36d1dc"/>
    </linearGradient>
  </defs>

  <style>
    .title, .subtitle { font-family: "Segoe UI", Helvetica, Arial, sans-serif; fill: #ffffff; }
    .title { font-size: 64px; font-weight: 700; }
    .subtitle { font-size: 22px; font-weight: 600; letter-spacing: 6px; opacity: 0.95; }
    .fade { animation: fadeIn 1.6s ease-out both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .wave1 { animation: drift1 14s linear infinite; }
    .wave2 { animation: drift2 9s linear infinite; }
    @keyframes drift1 { from { transform: translateX(0); } to { transform: translateX(-400px); } }
    @keyframes drift2 { from { transform: translateX(-500px); } to { transform: translateX(0); } }

    .ship { animation: sail 38s linear infinite; }
    @keyframes sail { from { transform: translateX(-140px); } to { transform: translateX(1340px); } }
    .bob { transform-box: fill-box; transform-origin: center; animation: bob 3.6s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-2.5deg); }
      50%      { transform: translateY(-7px) rotate(2.5deg); }
    }
  </style>

  <!-- full-bleed sea so text always sits on blue -->
  <rect width="1200" height="300" fill="url(#sea)"/>

  <!-- name + title -->
  <g class="fade">
    <text class="title" x="600" y="122" text-anchor="middle">Elyse Messer</text>
    <text class="subtitle" x="600" y="168" text-anchor="middle">SENIOR ENGINEER &#183; ELCANO</text>
  </g>

  <!-- the Victoria, sailing the gradient sea -->
  <g transform="translate(0,236)">
    <g class="ship">
      <g class="bob">
        <!-- main sail -->
        <path d="M -5 -64 Q -28 -38 -44 -8 L -5 -8 Z" fill="#ffffff"/>
        <!-- jib sail -->
        <path d="M 7 -56 L 46 -8 L 7 -8 Z" fill="#eaf2fb"/>
        <!-- mast -->
        <rect x="-2" y="-72" width="4" height="72" fill="#0f2d4e"/>
        <!-- pennant flag -->
        <path d="M 2 -72 L 22 -65 L 2 -58 Z" fill="#F472B6"/>
        <!-- hull -->
        <path d="M -58 0 L 58 0 L 42 17 L -42 17 Z" fill="#0f2d4e"/>
        <text x="0" y="12" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" font-weight="600" letter-spacing="2" fill="#ffffff">VICTORIA</text>
      </g>
    </g>
  </g>

  <!-- rolling waves (in front of the ship's hull) -->
  <g class="wave1" opacity="0.35">
    <path fill="#ffffff" d="M0 256 Q 100 234 200 256 T 400 256 T 600 256 T 800 256 T 1000 256 T 1200 256 T 1400 256 T 1600 256 V 300 H 0 Z"/>
  </g>
  <g class="wave2" opacity="0.5">
    <path fill="#ffffff" d="M0 268 Q 125 248 250 268 T 500 268 T 750 268 T 1000 268 T 1250 268 T 1500 268 T 1750 268 V 300 H 0 Z"/>
  </g>
</svg>
